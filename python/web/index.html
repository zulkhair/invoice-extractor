<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Invoice / Receipt Extractor</title>
<style>
  :root {
    --bg: #0f1115; --panel: #181b22; --panel2: #1f232c; --line: #2a2f3a;
    --text: #e6e9ef; --muted: #9aa3b2; --accent: #5b8cff; --good: #3ecf8e;
    --bad: #ff6b6b; --warn: #f5a623;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 15px/1.5 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px; border-bottom: 1px solid var(--line); background: var(--panel);
  }
  header h1 { font-size: 18px; margin: 0; font-weight: 600; }
  header .sub { color: var(--muted); font-size: 13px; }
  .badge { font-size: 12px; padding: 4px 10px; border-radius: 999px; border: 1px solid var(--line); color: var(--muted); }
  .badge.up { color: var(--good); border-color: #244c3b; background: #11261d; }
  .badge.down { color: var(--bad); border-color: #4c2424; background: #261111; }
  main { max-width: 880px; margin: 0 auto; padding: 24px; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
  .drop {
    border: 1.5px dashed var(--line); border-radius: 12px; padding: 32px; text-align: center;
    cursor: pointer; transition: border-color .15s, background .15s;
  }
  .drop:hover, .drop.over { border-color: var(--accent); background: #161a24; }
  .drop strong { color: var(--text); }
  .drop .hint { color: var(--muted); font-size: 13px; margin-top: 6px; }
  .row { display: flex; gap: 12px; align-items: center; margin-top: 16px; flex-wrap: wrap; }
  button {
    background: var(--accent); color: #fff; border: 0; border-radius: 8px;
    padding: 10px 18px; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  button:disabled { opacity: .5; cursor: not-allowed; }
  .fname { color: var(--muted); font-size: 13px; }
  .spinner { width: 16px; height: 16px; border: 2px solid #3a4150; border-top-color: var(--accent);
    border-radius: 50%; animation: spin .8s linear infinite; display: inline-block; vertical-align: -3px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .note { color: var(--muted); font-size: 13px; }
  .err { color: var(--bad); }
  .chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .chip { font-size: 12px; padding: 5px 11px; border-radius: 999px; background: var(--panel2); border: 1px solid var(--line); color: var(--muted); }
  .chip b { color: var(--text); font-weight: 600; }
  .chip.good { color: var(--good); border-color: #244c3b; }
  .chip.bad { color: var(--bad); border-color: #4c2424; }
  .chip.cat { color: var(--accent); border-color: #2a3a66; background:#141a2b; text-transform: capitalize; }
  .summary { display: grid; grid-template-columns: 1fr auto; gap: 4px 24px; align-items: baseline; }
  .vendor { font-size: 20px; font-weight: 600; }
  .total { font-size: 24px; font-weight: 700; text-align: right; }
  .meta-line { color: var(--muted); font-size: 13px; }
  table { width: 100%; border-collapse: collapse; margin-top: 16px; font-size: 14px; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--line); }
  th { color: var(--muted); font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  details { margin-top: 8px; }
  summary { cursor: pointer; color: var(--muted); font-size: 13px; }
  pre { background: #0b0d11; border: 1px solid var(--line); border-radius: 8px; padding: 14px;
    overflow: auto; font: 12.5px/1.5 ui-monospace, "SF Mono", Menlo, monospace; color: #cdd3df; }
  .copy { background: var(--panel2); color: var(--muted); padding: 4px 10px; font-size: 12px; font-weight: 500; }
</style>
</head>
<body>
<header>
  <div>
    <h1>Invoice / Receipt Extractor</h1>
    <div class="sub">Upload a receipt or invoice → structured JSON</div>
  </div>
  <span id="health" class="badge">checking…</span>
</header>

<main>
  <div class="card">
    <div id="drop" class="drop">
      <strong>Drop a file here</strong> or click to choose
      <div class="hint">PDF, JPG, PNG, WEBP, TIFF</div>
      <input id="file" type="file" accept=".pdf,.png,.jpg,.jpeg,.webp,.tif,.tiff,image/*,application/pdf" hidden />
    </div>
    <div class="row">
      <button id="go" disabled>Extract</button>
      <span id="fname" class="fname">No file selected</span>
    </div>
    <div id="status" class="row note" hidden></div>
  </div>

  <div id="result" class="card" hidden></div>
</main>

<script>
const $ = (id) => document.getElementById(id);
const drop = $("drop"), fileInput = $("file"), go = $("go");
let file = null;

// --- health badge ---
fetch("/health").then(r => r.json()).then(h => {
  const b = $("health");
  const up = h.ollama === "up";
  b.className = "badge " + (up ? "up" : "down");
  b.textContent = up ? `Ollama up · ${h.vision_path_model}` : "Ollama down";
}).catch(() => { $("health").className = "badge down"; $("health").textContent = "backend error"; });

// --- file selection ---
drop.onclick = () => fileInput.click();
fileInput.onchange = () => setFile(fileInput.files[0]);
["dragover", "dragenter"].forEach(e => drop.addEventListener(e, ev => { ev.preventDefault(); drop.classList.add("over"); }));
["dragleave", "drop"].forEach(e => drop.addEventListener(e, ev => { ev.preventDefault(); drop.classList.remove("over"); }));
drop.addEventListener("drop", ev => { if (ev.dataTransfer.files[0]) setFile(ev.dataTransfer.files[0]); });

function setFile(f) {
  file = f || null;
  $("fname").textContent = file ? file.name : "No file selected";
  go.disabled = !file;
}

// --- extract ---
go.onclick = async () => {
  if (!file) return;
  go.disabled = true;
  $("result").hidden = true;
  const status = $("status");
  status.hidden = false;
  const t0 = performance.now();
  let timer = setInterval(() => {
    status.innerHTML = `<span class="spinner"></span> Extracting… ${((performance.now()-t0)/1000).toFixed(0)}s ` +
      `<span class="note">(first run can take a few minutes — the model warms up)</span>`;
  }, 200);

  try {
    const fd = new FormData();
    fd.append("file", file);
    const res = await fetch("/extract", { method: "POST", body: fd });
    clearInterval(timer);
    const elapsed = ((performance.now()-t0)/1000).toFixed(1);
    const body = await res.json().catch(() => ({}));
    if (!res.ok) {
      status.innerHTML = `<span class="err">Error: ${body.detail || res.statusText}</span>`;
    } else {
      status.hidden = true;
      render(body, elapsed);
    }
  } catch (e) {
    clearInterval(timer);
    status.innerHTML = `<span class="err">Request failed: ${e.message}</span>`;
  } finally {
    go.disabled = false;
  }
};

// --- render result ---
const esc = (s) => String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
const dash = (v) => (v === null || v === undefined || v === "") ? "—" : v;
function money(v, cur) {
  if (v === null || v === undefined || v === "") return "—";
  const n = Number(String(v).replace(/,/g, ""));
  const s = isNaN(n) ? String(v) : n.toLocaleString("en-US");
  return (cur ? cur + " " : "") + s;
}

function render(data, elapsed) {
  const inv = data.invoice || {}, m = data.metadata || {};
  const cons = (m.consistency || {});
  const consistent = cons.consistent !== false;
  const items = inv.line_items || [];

  const chips = [
    `<span class="chip"><b>${esc(m.path || "?")}</b> path</span>`,
    `<span class="chip">${esc(m.model || "?")}</span>`,
    `<span class="chip">${esc(m.latency_s ?? elapsed)}s</span>`,
    inv.category ? `<span class="chip cat">${esc(inv.category)}</span>` : "",
    `<span class="chip ${consistent ? "good" : "bad"}">${consistent ? "✓ totals consistent" : "✗ totals off"}</span>`,
    m.fell_back ? `<span class="chip warn">fell back to vision</span>` : "",
  ].filter(Boolean).join("");

  const rows = items.map(li => `
    <tr>
      <td>${esc(dash(li.description))}</td>
      <td class="num">${esc(dash(li.quantity))}</td>
      <td class="num">${money(li.unit_price, inv.currency)}</td>
      <td class="num">${money(li.amount, inv.currency)}</td>
    </tr>`).join("") || `<tr><td colspan="4" class="note">No line items</td></tr>`;

  $("result").hidden = false;
  $("result").innerHTML = `
    <div class="chips">${chips}</div>
    <div class="summary">
      <div class="vendor">${esc(dash(inv.vendor_name))}</div>
      <div class="total">${money(inv.total_amount, inv.currency)}</div>
      <div class="meta-line">${esc(dash(inv.invoice_date))}${inv.due_date ? " · due " + esc(inv.due_date) : ""}${inv.invoice_number ? " · " + esc(inv.invoice_number) : ""}</div>
      <div class="meta-line">subtotal ${money(inv.subtotal, inv.currency)}${inv.tax_amount ? " · tax " + money(inv.tax_amount, inv.currency) : ""}</div>
    </div>
    <table>
      <thead><tr><th>Item</th><th class="num">Qty</th><th class="num">Unit</th><th class="num">Amount</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <details>
      <summary>Raw JSON</summary>
      <div class="row"><button class="copy" id="copy">Copy</button></div>
      <pre id="raw">${esc(JSON.stringify(data, null, 2))}</pre>
    </details>`;

  $("copy").onclick = () => navigator.clipboard.writeText(JSON.stringify(data, null, 2));
}
</script>
</body>
</html>
