<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Receipts — turn a photo into an expense</title>
<script>
  // Set theme before paint to avoid a flash.
  (function () {
    var t = localStorage.getItem("theme")
      || (matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
    document.documentElement.setAttribute("data-theme", t);
  })();
</script>
<style>
  :root {
    --font-ui: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    --font-mono: ui-monospace, "Cascadia Code", "SF Mono", Menlo, Consolas, monospace;
    /* dark = warm ink */
    --page: #16130f; --surface: #1e1a14; --ink: #ece5d6; --ink-dim: #b7af9e;
    --muted: #8b8373; --hair: #342f25; --hair-2: #4a4336;
    --accent: #8b97ff; --accent-ink: #0a0c18; --good: #74d39a; --bad: #ff9b94;
    --shadow: 0 18px 40px -18px rgba(0,0,0,.6);
  }
  :root[data-theme="light"] {
    /* light = manila page + receipt paper */
    --page: #e7e0cf; --surface: #fbf9f2; --ink: #2a251c; --ink-dim: #5b5446;
    --muted: #8a8273; --hair: #e4dcc9; --hair-2: #d0c7b1;
    --accent: #3a4fe0; --accent-ink: #ffffff; --good: #2f9e63; --bad: #c23a34;
    --shadow: 0 16px 34px -20px rgba(60,48,24,.35);
  }
  * { box-sizing: border-box; }
  [hidden] { display: none !important; }
  html, body { height: 100%; }
  body {
    margin: 0; background: var(--page); color: var(--ink); font: 15px/1.55 var(--font-ui);
    -webkit-font-smoothing: antialiased;
  }

  header {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    max-width: 600px; margin: 0 auto; padding: 22px 20px 6px;
  }
  .brand h1 { margin: 0; font-size: 19px; font-weight: 650; letter-spacing: -.01em; }
  .brand p { margin: 2px 0 0; color: var(--muted); font-size: 13px; }
  .tools { display: flex; align-items: center; gap: 8px; }
  .status { display: inline-flex; align-items: center; gap: 7px; font: 12px var(--font-mono);
    color: var(--muted); padding: 5px 10px; border: 1px solid var(--hair); border-radius: 999px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
  .status.up .dot { background: var(--good); box-shadow: 0 0 0 3px color-mix(in srgb, var(--good) 22%, transparent); }
  .status.down .dot { background: var(--bad); }
  .iconbtn {
    width: 34px; height: 34px; display: grid; place-items: center; cursor: pointer;
    background: transparent; color: var(--ink-dim); border: 1px solid var(--hair);
    border-radius: 9px; font-size: 15px; line-height: 1;
  }
  .iconbtn:hover { color: var(--ink); border-color: var(--hair-2); }

  main { max-width: 600px; margin: 0 auto; padding: 14px 20px 56px; }

  /* --- uploader (the "scanner") --- */
  .panel { background: var(--surface); border: 1px solid var(--hair); border-radius: 14px;
    padding: 18px; box-shadow: var(--shadow); }
  .drop {
    border: 1.5px dashed var(--hair-2); border-radius: 11px; padding: 30px 18px; text-align: center;
    cursor: pointer; transition: border-color .15s, background .15s, transform .05s;
  }
  .drop:hover, .drop.over { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 7%, transparent); }
  .drop:active { transform: scale(.997); }
  .drop .big { font-size: 15px; font-weight: 600; }
  .drop .big b { color: var(--accent); }
  .drop .fmt { margin-top: 7px; font: 12px var(--font-mono); color: var(--muted); letter-spacing: .02em; }
  .controls { display: flex; align-items: center; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
  .btn {
    background: var(--accent); color: var(--accent-ink); border: 0; border-radius: 9px;
    padding: 11px 20px; font-size: 14px; font-weight: 650; cursor: pointer; transition: filter .15s, transform .05s;
  }
  .btn:hover:not(:disabled) { filter: brightness(1.06); }
  .btn:active:not(:disabled) { transform: translateY(1px); }
  .btn:disabled { opacity: .45; cursor: not-allowed; }
  .fname { color: var(--muted); font: 13px var(--font-mono); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .status-line { margin-top: 14px; font-size: 13.5px; color: var(--ink-dim); display: flex; align-items: center; gap: 9px; flex-wrap: wrap; }
  .status-line .hint { color: var(--muted); font-size: 12.5px; }
  .status-line.err { color: var(--bad); }
  .spinner { width: 15px; height: 15px; border: 2px solid var(--hair-2); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .7s linear infinite; flex: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* --- result rendered as a torn receipt --- */
  .receipt {
    position: relative; margin-top: 22px; background: var(--surface); color: var(--ink);
    padding: 24px 22px 26px; box-shadow: var(--shadow);
    animation: print .5s ease-out;
  }
  @keyframes print { from { clip-path: inset(0 0 100% 0); opacity: .3; } to { clip-path: inset(0 0 0 0); opacity: 1; } }
  /* torn bottom edge: page-colored teeth cut into the receipt */
  .receipt::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: -1px; height: 9px;
    background-image:
      linear-gradient(45deg, transparent 50%, var(--page) 50%),
      linear-gradient(-45deg, transparent 50%, var(--page) 50%);
    background-size: 11px 9px; background-repeat: repeat-x; background-position: 0 100%;
  }
  .r-head { text-align: center; position: relative; }
  .vendor { font: 600 18px/1.3 var(--font-mono); letter-spacing: .01em; word-break: break-word; }
  .r-meta { margin-top: 6px; font: 12.5px var(--font-mono); color: var(--muted); }
  .stamp {
    display: inline-block; margin-top: 12px; padding: 4px 12px; transform: rotate(-2deg);
    font: 600 11px var(--font-mono); text-transform: uppercase; letter-spacing: .14em;
    color: var(--accent); border: 1.5px solid color-mix(in srgb, var(--accent) 55%, transparent);
    border-radius: 5px; background: color-mix(in srgb, var(--accent) 8%, transparent);
  }
  .rule { height: 0; border-top: 1.5px solid var(--hair-2); margin: 16px 0; }
  .rule.dashed { border-top-style: dashed; border-color: var(--hair); }
  .lines { font: 13.5px/1.7 var(--font-mono); }
  .line { display: flex; gap: 14px; justify-content: space-between; padding: 4px 0; border-bottom: 1px dashed var(--hair); }
  .line:last-child { border-bottom: 0; }
  .li-name { color: var(--ink); word-break: break-word; }
  .li-amt { color: var(--ink-dim); font-variant-numeric: tabular-nums; white-space: nowrap; }
  .empty-line { font: 13px var(--font-mono); color: var(--muted); padding: 6px 0; }
  .totalrow { display: flex; justify-content: space-between; align-items: baseline; }
  .t-label { font: 600 12px var(--font-mono); letter-spacing: .18em; color: var(--muted); }
  .t-amt { font: 700 24px var(--font-mono); font-variant-numeric: tabular-nums; letter-spacing: -.01em; }
  .r-foot { font: 11.5px var(--font-mono); color: var(--muted); text-align: center; }

  details { margin-top: 16px; }
  summary { cursor: pointer; font: 12px var(--font-mono); color: var(--muted); list-style: none; }
  summary::-webkit-details-marker { display: none; }
  summary::before { content: "▸ "; }
  details[open] summary::before { content: "▾ "; }
  .json-tools { display: flex; justify-content: flex-end; margin: 8px 0; }
  .copy { background: transparent; color: var(--muted); border: 1px solid var(--hair); border-radius: 7px;
    padding: 4px 11px; font: 12px var(--font-ui); cursor: pointer; }
  .copy:hover { color: var(--ink); border-color: var(--hair-2); }
  pre { margin: 0; background: var(--page); border: 1px solid var(--hair); border-radius: 8px;
    padding: 13px; overflow: auto; font: 12.5px/1.55 var(--font-mono); color: var(--ink-dim); }

  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  @media (max-width: 480px) {
    header { flex-wrap: wrap; }
    .t-amt { font-size: 21px; }
  }
  @media (prefers-reduced-motion: reduce) {
    .receipt { animation: none; }
    .spinner { animation-duration: 0s; }
  }
</style>
</head>
<body>
<header>
  <div class="brand">
    <h1>Receipts</h1>
    <p>Turn a receipt photo into a structured expense.</p>
  </div>
  <div class="tools">
    <span id="health" class="status"><span class="dot"></span>checking…</span>
    <button id="theme" class="iconbtn" aria-label="Toggle theme">☾</button>
  </div>
</header>

<main>
  <div class="panel">
    <div id="drop" class="drop" role="button" tabindex="0" aria-label="Choose a receipt file">
      <div class="big"><b>Drop a receipt</b> or click to choose</div>
      <div class="fmt">JPG · PNG · PDF · WEBP · TIFF</div>
      <input id="file" type="file" accept=".pdf,.png,.jpg,.jpeg,.webp,.tif,.tiff,image/*,application/pdf" hidden />
    </div>
    <div class="controls">
      <button id="go" class="btn" disabled>Extract</button>
      <span id="fname" class="fname">No file chosen</span>
    </div>
    <div id="status" class="status-line" hidden></div>
  </div>

  <div id="result" class="receipt" hidden></div>
</main>

<script>
const $ = (id) => document.getElementById(id);
const root = document.documentElement;

// --- theme ---
const themeBtn = $("theme");
function setTheme(t) {
  root.setAttribute("data-theme", t);
  localStorage.setItem("theme", t);
  themeBtn.textContent = t === "dark" ? "☾" : "☀";
  themeBtn.setAttribute("aria-label", t === "dark" ? "Switch to light theme" : "Switch to dark theme");
}
setTheme(root.getAttribute("data-theme") || "dark");
themeBtn.onclick = () => setTheme(root.getAttribute("data-theme") === "dark" ? "light" : "dark");

// --- health ---
fetch("/health").then(r => r.json()).then(h => {
  const b = $("health"), up = h.ollama === "up";
  b.className = "status " + (up ? "up" : "down");
  b.innerHTML = `<span class="dot"></span>${up ? "Ready · " + esc(h.vision_path_model) : "Engine offline"}`;
}).catch(() => { $("health").className = "status down"; $("health").innerHTML = `<span class="dot"></span>Backend error`; });

// --- file selection ---
const drop = $("drop"), fileInput = $("file"), go = $("go");
let file = null;
drop.onclick = () => fileInput.click();
drop.onkeydown = (e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); fileInput.click(); } };
fileInput.onchange = () => setFile(fileInput.files[0]);
["dragover", "dragenter"].forEach(e => drop.addEventListener(e, ev => { ev.preventDefault(); drop.classList.add("over"); }));
["dragleave", "drop"].forEach(e => drop.addEventListener(e, ev => { ev.preventDefault(); drop.classList.remove("over"); }));
drop.addEventListener("drop", ev => { if (ev.dataTransfer.files[0]) setFile(ev.dataTransfer.files[0]); });
function setFile(f) { file = f || null; $("fname").textContent = file ? file.name : "No file chosen"; go.disabled = !file; }

// --- extract ---
go.onclick = async () => {
  if (!file) return;
  go.disabled = true;
  $("result").hidden = true;
  const status = $("status");
  status.hidden = false; status.className = "status-line";
  const t0 = performance.now();
  const timer = setInterval(() => {
    status.innerHTML = `<span class="spinner"></span> Reading the receipt… ${((performance.now()-t0)/1000).toFixed(0)}s `
      + `<span class="hint">first run warms the model up (a minute or two)</span>`;
  }, 200);

  try {
    const fd = new FormData(); fd.append("file", file);
    const res = await fetch("/extract", { method: "POST", body: fd });
    clearInterval(timer);
    const elapsed = ((performance.now()-t0)/1000).toFixed(1);
    const body = await res.json().catch(() => ({}));
    if (!res.ok) {
      status.className = "status-line err";
      status.innerHTML = `Couldn't read that receipt — ${esc(body.detail || res.statusText)}`;
    } else {
      status.hidden = true; status.innerHTML = "";
      render(body, elapsed);
    }
  } catch (e) {
    clearInterval(timer);
    status.className = "status-line err";
    status.innerHTML = `Request failed — ${esc(e.message)}`;
  } finally {
    go.disabled = false;
  }
};

// --- helpers ---
function esc(s) { return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c])); }
const dash = (v) => (v === null || v === undefined || v === "") ? "—" : v;
function money(v, cur) {
  if (v === null || v === undefined || v === "") return "—";
  const n = Number(String(v).replace(/,/g, ""));
  const s = isNaN(n) ? String(v) : n.toLocaleString("en-US");
  return (cur ? cur + " " : "") + s;
}
function dt(v) { return v ? String(v).replace("T", " ").replace(/\.\d+$/, "") : "—"; }

// --- render the receipt ---
function render(data, elapsed) {
  const inv = data.invoice || {}, m = data.metadata || {};
  const items = inv.line_items || [];
  const meta = [dt(inv.transaction_datetime), inv.currency ? esc(inv.currency) : null].filter(Boolean).join(" · ");

  const lines = items.map(li => `
    <div class="line"><span class="li-name">${esc(dash(li.description))}</span><span class="li-amt">${money(li.amount, inv.currency)}</span></div>
  `).join("") || `<div class="empty-line">No line items read</div>`;

  const foot = [
    m.path ? `via ${esc(m.path)}` : null,
    m.model ? esc(m.model) : null,
    `${esc(m.latency_s ?? elapsed)}s`,
    m.fell_back ? "fell back to vision" : null,
  ].filter(Boolean).join(" · ");

  const el = $("result");
  el.hidden = false;
  el.innerHTML = `
    <div class="r-head">
      <div class="vendor">${esc(dash(inv.vendor_name))}</div>
      <div class="r-meta">${meta || "—"}</div>
      ${inv.category ? `<div><span class="stamp">${esc(inv.category)}</span></div>` : ""}
    </div>
    <div class="rule dashed"></div>
    <div class="lines">${lines}</div>
    <div class="rule"></div>
    <div class="totalrow"><span class="t-label">TOTAL</span><span class="t-amt">${money(inv.total_amount, inv.currency)}</span></div>
    <div class="rule dashed"></div>
    <div class="r-foot">${foot}</div>
    <details>
      <summary>Raw JSON</summary>
      <div class="json-tools"><button class="copy" id="copy">Copy</button></div>
      <pre id="raw">${esc(JSON.stringify(data, null, 2))}</pre>
    </details>`;

  $("copy").onclick = () => navigator.clipboard.writeText(JSON.stringify(data, null, 2));
  el.scrollIntoView({ behavior: "smooth", block: "nearest" });
}
</script>
</body>
</html>
